<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawamu School - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8DB600 0%, #6B8E00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 450px;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header img { height: 80px; margin-bottom: 15px; }
        .login-header h1 { color: #8DB600; font-size: 28px; }
        .login-header .tagline { color: #666; font-size: 12px; }
        
        .user-type-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .user-card {
            padding: 15px 10px;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .user-card:hover {
            border-color: #8DB600;
            transform: translateY(-2px);
        }
        .user-card.active {
            border-color: #8DB600;
            background: #F0F5E6;
        }
        .user-card .icon { font-size: 32px; display: block; margin-bottom: 5px; }
        .user-card .label { font-size: 12px; font-weight: bold; color: #333; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #8DB600; }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #8DB600;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-btn:hover { background: #6B8E00; }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="images/Logo.png" alt="Dawamu School">
            <h1>DAWAMU SCHOOL</h1>
            <p class="tagline">Transforming Boys Into Leaders</p>
        </div>
        
        <div class="user-type-selector">
            <div class="user-card active" data-role="admin" onclick="selectUser('admin')">
                <span class="icon">👑</span>
                <span class="label">Admin</span>
            </div>
            <div class="user-card" data-role="teacher" onclick="selectUser('teacher')">
                <span class="icon">👨‍🏫</span>
                <span class="label">Teacher</span>
            </div>
            <div class="user-card" data-role="parent" onclick="selectUser('parent')">
                <span class="icon">👨‍👩‍👧</span>
                <span class="label">Parent</span>
            </div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        function selectUser(role) {
            document.querySelectorAll('.user-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.role === role) {
                    card.classList.add('active');
                }
            });
            
            const emails = {
                admin: 'admin@dawamu.com',
                teacher: 'teacher@dawamu.com',
                parent: 'parent@dawamu.com'
            };
            document.getElementById('email').value = emails[role] || '';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    const role = data.user.role;
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else if (role === 'dean') {
                        window.location.href = 'dean-dashboard.html';
                    } else if (role === 'deputy') {
                        window.location.href = 'deputy-dashboard.html';
                    } else if (role === 'teacher') {
                        window.location.href = 'teacher-dashboard.html';
                    } else if (role === 'parent') {
                        window.location.href = 'parent-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorDiv.textContent = data.message || 'Invalid email or password';
                    errorDiv.style.display = 'block';
                }
            } catch(err) {
                errorDiv.textContent = 'Server error. Please try again.';
                errorDiv.style.display = 'block';
                console.error('Login error:', err);
            }
        });
    </script>
</body>
</html>
